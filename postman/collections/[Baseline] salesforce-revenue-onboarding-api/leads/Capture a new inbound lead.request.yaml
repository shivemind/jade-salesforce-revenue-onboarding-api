type: http
name: Capture a new inbound lead
url: '{{baseUrl}}/leads'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "email": "fjtVH796@IbMELoLABvihmWPx.iu",
      "company": "string",
      "source": "webinar",
      "interestArea": "revenue-operations"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "leadId": "18bab210-9871-bbb7-42b7-c3e168d4aa03",
            "status": "qualified",
            "score": 5709,
            "owner": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Lead created
