type: http
name: Capture a new inbound lead
url: '{{baseUrl}}/leads'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "email": "zWnYXYLX@vUssoESXCG.oaw",
      "company": "string",
      "source": "webinar",
      "interestArea": "revenue-operations"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "leadId": "89ebee38-4f59-7cd8-c5bb-6c20e8f02bdf",
            "status": "working",
            "score": 2462,
            "owner": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Lead created
