type: http
name: Mark an opportunity as close-won and trigger onboarding
url: '{{baseUrl}}/opportunities/:opportunityId/close-won'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: opportunityId
    value: 916f79b2-4bb9-884c-9b64-2eaf817a1eae
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "runId": "ed2ec64e-6f5c-0dc6-e29f-35eee364ffa2",
            "workflowName": "customer-onboarding",
            "status": "failed",
            "customerId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Close-won workflow started
