type: http
name: Convert a qualified lead into an opportunity
url: '{{baseUrl}}/opportunities'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "leadId": "4b849bdf-0afd-4eb0-34cd-37a8f5740ee4",
      "accountName": "string",
      "amount": 5872.264015537545,
      "expectedCloseDate": "1984-09-30",
      "productFamily": "string",
      "billingModel": "project"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "opportunityId": "248e67a8-d417-8288-c21a-1f0c2cb88221",
            "accountName": "string",
            "stage": "proposal",
            "amount": 1494.6408230437557,
            "expectedCloseDate": "1991-01-21"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunity created
